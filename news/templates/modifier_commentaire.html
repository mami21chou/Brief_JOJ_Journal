{% extends "base.html" %}

{% block title %}Modifier commentaire{% endblock %}

{% block content %}

<div class="container mt-5">

  <div class="card shadow-sm p-4">
    <h3 class="mb-4">Modifier votre commentaire</h3>

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        {{ form.message.label_tag }}
        {{ form.message }}
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning">
          Modifier
        </button>

        <a href="{% url 'detail_article' form.instance.article.id %}" class="btn btn-secondary">
          Annuler
        </a>
      </div>

    </form>
  </div>

</div>

{% endblock %}

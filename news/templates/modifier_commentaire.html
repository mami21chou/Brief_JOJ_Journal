{% extends "base.html" %}
{% block title %}Modifier le commentaire — JOJ NEWS{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:600px">

  <div class="card form-page-card">
    <div class="card-body p-4">

      <div class="form-page-icon icon-warning">
        <i class="bi bi-pencil-fill"></i>
      </div>

      <h3 class="form-page-title">Modifier le commentaire</h3>
      <p class="form-page-subtitle">Apportez vos modifications ci-dessous.</p>

      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label fw-semibold" for="{{ form.message.id_for_label }}">
            {{ form.message.label }}
          </label>
          {{ form.message }}
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-warning px-4">
            <i class="bi bi-check-lg me-2"></i>Enregistrer
          </button>
          <a href="{% url 'detail_article' form.instance.article.id %}" class="btn btn-light px-4">
            Annuler
          </a>
        </div>
      </form>

    </div>
  </div>

</div>
{% endblock %}
